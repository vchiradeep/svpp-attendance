<!DOCTYPE html>
<html>
<head>
    <title>Student Login — SVPCET</title>
    <link rel="stylesheet" href="style.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;}
      body{min-height:100vh;background:linear-gradient(160deg,#ecfdf5,#d1fae5,#f0fdf4);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;padding:24px;}
      .box{width:100%;max-width:400px;background:white;border-radius:22px;padding:40px 36px;box-shadow:0 20px 60px rgba(5,150,105,0.15);border-top:5px solid #059669;animation:fadeUp 0.5s ease;}
      @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      .icon{width:64px;height:64px;background:linear-gradient(135deg,#059669,#34d399);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;box-shadow:0 8px 22px rgba(5,150,105,0.28);}
      h2{text-align:center;font-family:'Playfair Display',serif;font-size:24px;color:#064e3b;margin-bottom:6px;}
      .sub{text-align:center;font-size:13px;color:#6b7280;margin-bottom:28px;}
      .lbl{display:block;font-size:12px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
      .grp{margin-bottom:16px;}
      input,select{width:100%;padding:13px 15px;border:2px solid #d1fae5;border-radius:11px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#1e293b;background:#f0fdf4;outline:none;transition:all 0.25s;}
      input:focus,select:focus{border-color:#059669;background:white;box-shadow:0 0 0 4px rgba(5,150,105,0.1);}
      input.err{border-color:#ef4444 !important;background:#fef2f2 !important;}

      /* ERROR MESSAGE */
      .err-msg{display:none;margin-top:8px;padding:10px 14px;background:#fef2f2;border:1.5px solid #fecaca;border-radius:9px;font-size:13px;font-weight:600;color:#dc2626;line-height:1.5;}
      .err-msg.show{display:block;}

      .btn{width:100%;padding:14px;background:linear-gradient(135deg,#059669,#10b981);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.25s;margin-top:6px;}
      .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(5,150,105,0.35);}
      .back{display:block;text-align:center;margin-top:20px;font-size:13px;color:#059669;text-decoration:none;font-weight:600;}

      /* SUCCESS OVERLAY */
      .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:none;align-items:center;justify-content:center;}
      .overlay.show{display:flex;}
      .popup{background:white;border-radius:22px;padding:40px 36px;text-align:center;max-width:320px;width:90%;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
      @keyframes popIn{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}}
      .pop-icon{font-size:56px;margin-bottom:14px;}
      .pop-title{font-size:21px;font-weight:800;color:#064e3b;margin-bottom:8px;}
      .pop-msg{font-size:14px;color:#64748b;line-height:1.5;}
      .pop-roll{font-size:16px;font-weight:800;color:#059669;margin:10px 0;}
    </style>
</head>
<body>

<div class="box">
  <div class="icon">👨‍🎓</div>
  <h2>Student Login</h2>
  <p class="sub">Enter your roll number and section</p>

  <div class="grp">
    <label class="lbl">Roll Number</label>
    <input type="text" id="roll" placeholder="e.g. 25G01A0501" autocomplete="off"
           oninput="clearErrors()" onkeydown="if(event.key==='Enter')login()">
    <div class="err-msg" id="rollErr"></div>
  </div>

  <div class="grp">
    <label class="lbl">Section</label>
    <select id="section" onchange="clearErrors()">
      <option value="">— Select your section —</option>
      <option>CSE - A</option><option>CSE - B</option>
      <option>CSE - C</option><option>CSE - D</option>
      <option>A.I - A</option><option>A.I - B</option><option>A.I - C</option>
      <option>AIML - A</option><option>AIML - B</option><option>AIML - C</option>
      <option>CIVIL</option><option>D.S</option>
      <option>ECE - A</option><option>ECE - B</option><option>ECE - C</option>
      <option>Mechanical</option>
    </select>
    <div class="err-msg" id="secErr"></div>
  </div>

  <button class="btn" onclick="login()">Login →</button>
  <a href="index.html" class="back">← Back to Home</a>
</div>

<!-- SUCCESS POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="pop-icon">✅</div>
    <div class="pop-title">Login Successful!</div>
    <div class="pop-roll" id="popRoll"></div>
    <div class="pop-msg">Redirecting to your dashboard...</div>
  </div>
</div>

<script>
// ===== ROLL NUMBER DATA (embedded, no external dependency) =====
const _SL = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
function _si(s){ return /^[0-9]{2}$/.test(s)?parseInt(s,10):100+_SL.indexOf(s[0])*10+parseInt(s[1],10); }
function _is(n){ if(n<=99)return String(n).padStart(2,"0"); const o=n-100; return _SL[Math.floor(o/10)]+(o%10); }
function _gen(br,s,e){ const r=[]; for(let i=_si(s);i<=_si(e);i++) r.push("25G01A"+br+_is(i)); return r; }

// All valid rolls per section
const ROLLS = {
  "CSE - A":    _gen("05","01","75"),
  "CSE - B":    _gen("05","76","F0"),
  "CSE - C":    _gen("05","F1","M5"),
  "CSE - D":    _gen("05","M6","R9"),
  "A.I - A":    _gen("43","01","75"),
  "A.I - B":    _gen("43","76","F0"),
  "A.I - C":    _gen("43","F1","I2"),
  "AIML - A":   _gen("42","01","75"),
  "AIML - B":   _gen("42","76","F0"),
  "AIML - C":   _gen("42","F1","M0"),
  "D.S":        _gen("32","01","41"),
  "ECE - A":    _gen("04","01","75"),
  "ECE - B":    _gen("04","76","B5"),
  "ECE - C":    _gen("02","01","19"),
  "CIVIL":      _gen("01","02","09"),
  "Mechanical": _gen("03","01","12"),
};

// Find which section a roll belongs to
function findSection(roll){
  for(const [sec, rolls] of Object.entries(ROLLS)){
    if(rolls.includes(roll)) return sec;
  }
  return null;
}

function clearErrors(){
  ["rollErr","secErr"].forEach(id=>{
    document.getElementById(id).className = "err-msg";
    document.getElementById(id).textContent = "";
  });
  document.getElementById("roll").classList.remove("err");
}

function showErr(id, msg){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = "err-msg show";
}

function login(){
  clearErrors();

  const rawRoll = document.getElementById("roll").value.trim();
  const section = document.getElementById("section").value;

  // 1. Check roll entered
  if(!rawRoll){
    showErr("rollErr", "⚠️ Please enter your roll number.");
    document.getElementById("roll").classList.add("err");
    document.getElementById("roll").focus();
    return;
  }

  // 2. Normalize roll to uppercase
  const roll = rawRoll.toUpperCase();

  // 3. Check section selected
  if(!section){
    showErr("secErr", "⚠️ Please select your section.");
    return;
  }

  // 4. Check if roll exists in selected section
  const sectionRolls = ROLLS[section] || [];
  if(sectionRolls.includes(roll)){
    // ✅ Valid — same section
    proceedLogin(roll, section);
    return;
  }

  // 5. Check if roll belongs to a DIFFERENT section
  const actualSection = findSection(roll);
  if(actualSection){
    // Roll exists but belongs to different section
    showErr("rollErr",
      `❌ You are not from ${section}.\n` +
      `Roll "${roll}" belongs to ${actualSection}.\n` +
      `Please select the correct section.`
    );
    document.getElementById("roll").classList.add("err");
    // Auto-select the correct section to help the student
    document.getElementById("section").value = actualSection;
    return;
  }

  // 6. Roll doesn't exist in any section
  showErr("rollErr",
    `❌ Invalid roll number "${roll}".\n` +
    `Please check your roll number and try again.`
  );
  document.getElementById("roll").classList.add("err");
}

function proceedLogin(roll, section){
  localStorage.setItem("studentRoll", roll);
  localStorage.setItem("section", section);

  // Show success popup
  document.getElementById("popRoll").textContent = roll + " — " + section;
  document.getElementById("overlay").classList.add("show");

  // Redirect after 1.5s
  setTimeout(() => { window.location.href = "studenthome.html"; }, 1500);
}
</script>

<div id="loader" style="display:none;"><div class="spinner"></div></div>
<script src="utils.js"></script>
</body>
</html>
