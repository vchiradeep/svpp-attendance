<!DOCTYPE html>
<html>
<head>
    <title>Student Login — SVPCET</title>
    <link rel="stylesheet" href="style.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');
 
      * { box-sizing: border-box; margin: 0; padding: 0; }
 
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #ecfdf5 0%, #d1fae5 60%, #f0fdf4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Plus Jakarta Sans', sans-serif;
        padding: 24px;
      }
 
      .login-wrapper {
        width: 100%;
        max-width: 400px;
        background: white;
        border-radius: 22px;
        padding: 40px 36px;
        box-shadow: 0 20px 60px rgba(5,150,105,0.13);
        border-top: 5px solid #059669;
        animation: fadeUp 0.5s ease;
      }
 
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(20px); }
        to   { opacity:1; transform:translateY(0); }
      }
 
      .login-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #059669, #34d399);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 20px;
        box-shadow: 0 8px 22px rgba(5,150,105,0.28);
      }
 
      h2 {
        text-align: center;
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        color: #064e3b;
        margin-bottom: 6px;
      }
 
      .subtitle {
        text-align: center;
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 28px;
      }
 
      .input-label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #065f46;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }
 
      .input-group { margin-bottom: 18px; }
 
      input, select {
        width: 100%;
        padding: 13px 15px;
        border: 2px solid #d1fae5;
        border-radius: 11px;
        font-size: 14px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #1e293b;
        background: #f0fdf4;
        outline: none;
        transition: all 0.25s ease;
      }
 
      input:focus, select:focus {
        border-color: #059669;
        background: white;
        box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
      }
 
      .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #059669, #10b981);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        font-family: 'Plus Jakarta Sans', sans-serif;
        cursor: pointer;
        transition: all 0.25s ease;
        margin-top: 6px;
        letter-spacing: 0.3px;
      }
 
      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(5,150,105,0.35);
        background: linear-gradient(135deg, #047857, #059669);
      }
 
      .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #059669;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }
 
      .back-link:hover { color: #047857; }
 
      @media (max-width: 480px) {
        .login-wrapper { padding: 32px 24px; }
        h2 { font-size: 22px; }
      }
    </style>
</head>
<body>
 
<div class="login-wrapper">
  <div class="login-icon">👨‍🎓</div>
  <h2>Student Login</h2>
  <p class="subtitle">Enter your details to view attendance</p>
 
  <div class="input-group">
    <label class="input-label">Roll Number</label>
    <input type="text" id="roll" placeholder="e.g. 25G01A0501">
  </div>
 
  <div class="input-group">
    <label class="input-label">Section</label>
    <select id="section">
      <option value="">Select your section</option>
      <option>CSE - A</option>
      <option>CSE - B</option>
      <option>CSE - C</option>
      <option>CSE - D</option>
      <option>A.I - A</option>
      <option>A.I - B</option>
      <option>A.I - C</option>
      <option>AIML - A</option>
      <option>AIML - B</option>
      <option>AIML - C</option>
      <option>CIVIL</option>
      <option>D.S</option>
      <option>ECE - A</option>
      <option>ECE - B</option>
      <option>ECE - C</option>
      <option>ECE - D</option>
    </select>
  </div>
 
  <button class="login-btn" onclick="studentLogin()">Login →</button>
  <a href="index.html" class="back-link">← Back to Home</a>
</div>
 
<script src="student.js"></script>
<div id="loader" style="display:none;"><div class="spinner"></div></div>
<script src="utils.js"></script>
</body>
</html>
