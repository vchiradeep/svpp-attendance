<!DOCTYPE html>
<html>
<head>
    <title>Student Login — SVPCET</title>
    <link rel="stylesheet" href="style.css">
    <script src="rollgen.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;}
      body{min-height:100vh;background:linear-gradient(160deg,#ecfdf5,#d1fae5,#f0fdf4);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;padding:24px;}
      .login-wrapper{width:100%;max-width:400px;background:white;border-radius:22px;padding:40px 36px;box-shadow:0 20px 60px rgba(5,150,105,0.15);border-top:5px solid #059669;animation:fadeUp 0.5s ease;}
      @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      .login-icon{width:64px;height:64px;background:linear-gradient(135deg,#059669,#34d399);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;box-shadow:0 8px 22px rgba(5,150,105,0.28);}
      h2{text-align:center;font-family:'Playfair Display',serif;font-size:24px;color:#064e3b;margin-bottom:6px;}
      .subtitle{text-align:center;font-size:13px;color:#6b7280;margin-bottom:28px;}
      .input-label{display:block;font-size:12px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
      .input-group{margin-bottom:18px;}
      input,select{width:100%;padding:13px 15px;border:2px solid #d1fae5;border-radius:11px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#1e293b;background:#f0fdf4;outline:none;transition:all 0.25s;}
      input:focus,select:focus{border-color:#059669;background:white;box-shadow:0 0 0 4px rgba(5,150,105,0.1);}
      input.error{border-color:#ef4444;background:#fef2f2;}
      .error-msg{color:#dc2626;font-size:13px;font-weight:600;margin-top:6px;display:none;padding:8px 12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;}
      .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#059669,#10b981);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.25s;margin-top:6px;}
      .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(5,150,105,0.35);}
      .back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#059669;text-decoration:none;font-weight:600;}

      /* SUCCESS POPUP */
      .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:none;align-items:center;justify-content:center;}
      .popup-overlay.show{display:flex;}
      .popup-box{background:white;border-radius:20px;padding:36px 32px;text-align:center;max-width:320px;width:90%;animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);}
      @keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
      .popup-icon{font-size:52px;margin-bottom:14px;}
      .popup-title{font-size:20px;font-weight:800;color:#064e3b;margin-bottom:8px;}
      .popup-msg{font-size:14px;color:#64748b;line-height:1.5;}
    </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-icon">👨‍🎓</div>
  <h2>Student Login</h2>
  <p class="subtitle">Enter your details to view attendance</p>

  <div class="input-group">
    <label class="input-label">Roll Number</label>
    <input type="text" id="roll" placeholder="e.g. 25G01A0501" oninput="clearError()">
    <div class="error-msg" id="rollError"></div>
  </div>

  <div class="input-group">
    <label class="input-label">Section</label>
    <select id="section" onchange="clearError()">
      <option value="">Select your section</option>
      <option>CSE - A</option><option>CSE - B</option><option>CSE - C</option><option>CSE - D</option>
      <option>A.I - A</option><option>A.I - B</option><option>A.I - C</option>
      <option>AIML - A</option><option>AIML - B</option><option>AIML - C</option>
      <option>CIVIL</option><option>D.S</option>
      <option>ECE - A</option><option>ECE - B</option><option>ECE - C</option>
      <option>Mechanical</option>
    </select>
    <div class="error-msg" id="sectionError"></div>
  </div>

  <button class="login-btn" onclick="studentLogin()">Login →</button>
  <a href="index.html" class="back-link">← Back to Home</a>
</div>

<!-- SUCCESS POPUP -->
<div class="popup-overlay" id="successPopup">
  <div class="popup-box">
    <div class="popup-icon">✅</div>
    <div class="popup-title">Login Successful!</div>
    <div class="popup-msg" id="popupMsg">Welcome! Redirecting to your dashboard...</div>
  </div>
</div>

<script>
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = "block";
}

function clearError() {
  ["rollError","sectionError"].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = "none";
  });
  document.getElementById("roll").classList.remove("error");
}

function studentLogin() {
  const roll    = document.getElementById("roll").value.trim().toUpperCase();
  const section = document.getElementById("section").value;

  clearError();

  // Validate roll entered
  if (!roll) {
    showError("rollError", "❌ Please enter your roll number");
    document.getElementById("roll").classList.add("error");
    return;
  }

  // Validate section selected
  if (!section) {
    showError("sectionError", "❌ Please select your section");
    return;
  }

  // ✅ Validate roll belongs to selected section
  if (!isValidRollForSection(roll, section)) {
    showError("rollError", `❌ Roll number "${roll}" does not belong to ${section}. Please check and try again.`);
    document.getElementById("roll").classList.add("error");
    return;
  }

  // ✅ All good — save and show success popup
  localStorage.setItem("studentRoll", roll);
  localStorage.setItem("section", section);

  document.getElementById("popupMsg").textContent = `Welcome ${roll}! Redirecting to your dashboard...`;
  document.getElementById("successPopup").classList.add("show");

  // Redirect after 1.5s
  setTimeout(() => { window.location.href = "studenthome.html"; }, 1500);
}

// Enter key support
document.addEventListener("keydown", e => { if (e.key === "Enter") studentLogin(); });
</script>

<div id="loader" style="display:none;"><div class="spinner"></div></div>
<script src="utils.js"></script>
</body>
</html>
