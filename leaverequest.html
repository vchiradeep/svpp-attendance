<!DOCTYPE html>
<html>
<head>
<title>Leave Request — SVPCET</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background:linear-gradient(160deg,#ecfdf5,#d1fae5,#f0fdf4); min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
  .page-header { background:#059669; color:white; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .page-header h2 { font-size:17px; font-weight:800; margin:0; }
  .back-btn { padding:8px 16px; background:rgba(255,255,255,0.2); border:none; border-radius:8px; color:white; font-weight:700; font-size:13px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; text-decoration:none; display:inline-block; }

  .container { max-width:700px; margin:0 auto; padding:24px 16px 50px; }

  .form-card { background:white; border-radius:18px; padding:28px; box-shadow:0 4px 24px rgba(5,150,105,0.12); margin-bottom:24px; border-top:4px solid #059669; }
  .form-card h3 { font-size:17px; font-weight:800; color:#064e3b; margin-bottom:18px; }
  .input-label { display:block; font-size:12px; font-weight:700; color:#065f46; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .input-group { margin-bottom:16px; }
  input, select, textarea { width:100%; padding:12px 15px; border:2px solid #d1fae5; border-radius:11px; font-size:14px; font-family:'Plus Jakarta Sans',sans-serif; color:#1e293b; background:#f0fdf4; outline:none; transition:0.25s; }
  input:focus, select:focus, textarea:focus { border-color:#059669; background:white; box-shadow:0 0 0 4px rgba(5,150,105,0.1); }
  textarea { resize:vertical; min-height:90px; }
  .submit-btn { width:100%; padding:14px; background:linear-gradient(135deg,#059669,#10b981); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer; transition:0.25s; }
  .submit-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(5,150,105,0.35); }

  /* REQUEST LIST */
  .request-card { background:white; border-radius:14px; padding:18px 20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:12px; border-left:4px solid #e2e8f0; }
  .request-card.pending  { border-left-color:#f59e0b; }
  .request-card.approved { border-left-color:#059669; }
  .request-card.rejected { border-left-color:#ef4444; }
  .req-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
  .req-date   { font-size:14px; font-weight:700; color:#1e293b; }
  .req-reason { font-size:13px; color:#64748b; margin-bottom:6px; }
  .req-subject{ font-size:12px; color:#94a3b8; }
  .req-remarks{ font-size:13px; font-weight:600; margin-top:8px; padding:8px 12px; border-radius:8px; }
  .req-remarks.approved { color:#059669; background:#f0fdf4; }
  .req-remarks.rejected { color:#ef4444; background:#fef2f2; }
  .status-pill { font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; text-transform:uppercase; }
  .pill-pending  { background:#fef3c7; color:#92400e; }
  .pill-approved { background:#dcfce7; color:#166534; }
  .pill-rejected { background:#fee2e2; color:#991b1b; }
  .empty { text-align:center; padding:40px; color:#94a3b8; font-size:14px; }

  /* SUCCESS POPUP */
  .popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; display:none; align-items:center; justify-content:center; }
  .popup-overlay.show { display:flex; }
  .popup-box { background:white; border-radius:20px; padding:36px 32px; text-align:center; max-width:320px; width:90%; animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
  .popup-icon  { font-size:52px; margin-bottom:14px; }
  .popup-title { font-size:20px; font-weight:800; color:#064e3b; margin-bottom:8px; }
  .popup-msg   { font-size:14px; color:#64748b; line-height:1.5; margin-bottom:20px; }
  .popup-btn   { padding:12px 28px; background:#059669; color:white; border:none; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
</style>
</head>
<body>

<div class="page-header">
  <h2>📋 Leave Request</h2>
  <a href="studenthome.html" class="back-btn">← Back to Dashboard</a>
</div>

<div class="container">

  <!-- SUBMIT FORM -->
  <div class="form-card">
    <h3>📝 Submit New Leave Request</h3>

    <div class="input-group">
      <label class="input-label">Date of Leave</label>
      <input type="date" id="leaveDate">
    </div>

    <div class="input-group">
      <label class="input-label">Subject (Optional — blank = Full Day)</label>
      <select id="leaveSubject">
        <option value="">Full Day Leave</option>
        <option value="PHY">Physics</option>
        <option value="BEEE">Electrical (BEEE)</option>
        <option value="ECE">Electronics (BEEE)</option>
        <option value="DS">Data Structures</option>
        <option value="DEVC">DE&amp;VC</option>
        <option value="EG LAB">Engineering Graphics</option>
        <option value="IT WORKSHOP">IT Workshop</option>
      </select>
    </div>

    <div class="input-group">
      <label class="input-label">Reason for Leave</label>
      <textarea id="leaveReason" placeholder="Explain your reason (medical, family, event, etc.)..."></textarea>
    </div>

    <button class="submit-btn" onclick="submitLeave()">📤 Submit Leave Request</button>
  </div>

  <!-- MY REQUESTS -->
  <div class="form-card" style="border-top-color:#3b82f6;">
    <h3>📋 My Leave Requests</h3>
    <div id="myRequests"><div class="empty">Loading your requests...</div></div>
  </div>

</div>

<!-- SUCCESS POPUP -->
<div class="popup-overlay" id="successPopup">
  <div class="popup-box">
    <div class="popup-icon">📋</div>
    <div class="popup-title">Request Submitted!</div>
    <div class="popup-msg">Your leave request has been sent. Your teacher will review it shortly.</div>
    <button class="popup-btn" onclick="document.getElementById('successPopup').classList.remove('show')">OK</button>
  </div>
</div>

<script>
const API     = window.location.origin;
const roll    = localStorage.getItem("studentRoll");
const section = localStorage.getItem("section");

if(!roll || !section){ alert("Please login first"); window.location.href="student.html"; }

const subjectLabels = {
  "PHY":"Physics","BEEE":"Electrical (BEEE)","ECE":"Electronics (BEEE)",
  "DS":"Data Structures","DEVC":"DE&VC","EG LAB":"EG Lab","IT WORKSHOP":"IT Workshop"
};

// Set today as default date
const today = new Date().toISOString().split("T")[0];
document.getElementById("leaveDate").value = today;

async function submitLeave(){
  const date    = document.getElementById("leaveDate").value;
  const subject = document.getElementById("leaveSubject").value;
  const reason  = document.getElementById("leaveReason").value.trim();

  if(!date)  { alert("⚠️ Please select a date");        return; }
  if(!reason){ alert("⚠️ Please enter a reason");       return; }

  showLoader();

  try {
    const res  = await fetch(API + "/leave/request", {
      method:  "POST",
      headers: {"Content-Type":"application/json"},
      body:    JSON.stringify({ studentName:roll, section, date, reason, subject:subject||null })
    });
    const data = await res.json();
    hideLoader();

    if(data.success){
      document.getElementById("leaveReason").value = "";
      document.getElementById("successPopup").classList.add("show");
      // Refresh list
      historyLoaded = false;
      loadMyRequests();
    } else {
      alert("❌ " + (data.message || "Failed to submit request"));
    }
  } catch(err){
    hideLoader();
    alert("❌ Network error. Please check your connection.");
  }
}

let historyLoaded = false;

async function loadMyRequests(){
  if(historyLoaded) return;
  const box = document.getElementById("myRequests");

  try {
    const res  = await fetch(API + "/leave/student/" + roll);
    const data = await res.json();
    historyLoaded = true;

    if(!data.success || !data.requests || data.requests.length === 0){
      box.innerHTML = `<div class="empty">No leave requests yet. Submit your first one above!</div>`;
      return;
    }

    box.innerHTML = data.requests.map(r => {
      const date     = new Date(r.date).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
      const status   = r.status.toLowerCase();
      const pillCls  = status==="pending"?"pill-pending":status==="approved"?"pill-approved":"pill-rejected";
      const subLabel = r.subject ? (subjectLabels[r.subject]||r.subject) : "Full Day";

      return `<div class="request-card ${status}">
        <div class="req-header">
          <div class="req-date">📅 ${date}</div>
          <span class="status-pill ${pillCls}">${r.status}</span>
        </div>
        <div class="req-reason">💬 ${r.reason}</div>
        <div class="req-subject">📘 ${subLabel}</div>
        ${r.remarks
          ? `<div class="req-remarks ${status}">${status==="approved"?"✅":"❌"} Teacher's Note: ${r.remarks}</div>`
          : status==="pending" ? `<div style="font-size:12px;color:#94a3b8;margin-top:8px;">⏳ Awaiting teacher review...</div>` : ""}
        ${r.reviewedAt ? `<div style="font-size:11px;color:#94a3b8;margin-top:6px;">Reviewed: ${new Date(r.reviewedAt).toLocaleString()}</div>` : ""}
      </div>`;
    }).join("");

  } catch(err){
    box.innerHTML = `<div class="empty" style="color:#ef4444;">Failed to load requests. Please refresh.</div>`;
  }
}

loadMyRequests();
</script>

<div id="loader" style="display:none;"><div class="spinner"></div></div>
<script src="utils.js"></script>
</body>
</html>
