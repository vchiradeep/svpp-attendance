<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mark Attendance — SVPCET</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
<style>
body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px);color:white;position:sticky;top:0;z-index:50;}
.navbar h2{margin:0;font-size:17px;font-weight:800;}
.navbar button{margin-left:8px;padding:8px 14px;border:none;border-radius:8px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;cursor:pointer;}
.page{max-width:960px;margin:20px auto;padding:0 16px 60px;}
.info-bar{background:rgba(255,255,255,0.12);border-radius:14px;padding:16px 20px;margin-bottom:18px;display:flex;gap:20px;flex-wrap:wrap;color:white;border:1px solid rgba(255,255,255,0.15);}
.info-item span{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.8px;display:block;}
.info-item strong{font-size:15px;font-weight:700;}
.notice{border-radius:12px;padding:13px 18px;margin-bottom:16px;font-size:13px;font-weight:600;}
.notice.warn{background:#fef3c7;color:#92400e;border:2px solid #f59e0b;}
.notice.lock{background:#fee2e2;color:#991b1b;border:2px solid #ef4444;}
.controls{background:rgba(255,255,255,0.1);border-radius:14px;padding:18px;margin-bottom:18px;border:1px solid rgba(255,255,255,0.15);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.btn{padding:9px 16px;border:none;border-radius:9px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;cursor:pointer;transition:0.2s;}
.btn:hover{transform:scale(1.04);}
.btn.p{background:#4caf50;color:white;}.btn.a{background:#f44336;color:white;}
.btn.u{background:#ff9800;color:white;}.btn.c{background:#607d8b;color:white;}
.btn.e{background:#3f51b5;color:white;}.btn.w{background:rgba(255,255,255,0.18);color:white;border:1px solid rgba(255,255,255,0.25);}
.search-inp{width:100%;padding:11px 15px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;background:rgba(255,255,255,0.15);color:white;outline:none;margin-bottom:8px;}
.search-inp::placeholder{color:rgba(255,255,255,0.5);}
.bulk-inp{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;background:rgba(255,255,255,0.15);color:white;outline:none;width:210px;}
.bulk-inp::placeholder{color:rgba(255,255,255,0.5);}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.s-card{padding:12px 10px;border-radius:10px;cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:600;text-align:center;border:2px solid transparent;user-select:none;}
.s-card:hover{transform:scale(1.04);}
.s-card.unmarked{background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.2);}
.s-card.present{background:#a5d6a7;color:#1b5e20;border-color:#4caf50;}
.s-card.absent{background:#ef9a9a;color:#7f0000;border-color:#f44336;}
.summary-panel{background:rgba(255,255,255,0.95);border-radius:14px;padding:20px;margin-bottom:20px;}
.summary-panel h3{color:#1e293b;font-size:15px;font-weight:800;margin-bottom:14px;}
.summary-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.ss{background:#f8fafc;border-radius:10px;padding:12px 18px;text-align:center;border:1px solid #e2e8f0;min-width:80px;}
.ss .val{font-size:26px;font-weight:800;color:#1e293b;}.ss .lbl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.8px;}
canvas{max-width:150px;max-height:150px;}
.submit-row{text-align:center;padding:10px 0 20px;}
.submit-btn{padding:16px 50px;background:linear-gradient(135deg,#4caf50,#2e7d32);color:white;border:none;border-radius:14px;font-size:17px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:0.25s;box-shadow:0 6px 24px rgba(46,125,50,0.4);}
.submit-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(46,125,50,0.5);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none !important;}

/* SUCCESS POPUP — fixed position, high z-index, no interference with loader */
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:none;align-items:center;justify-content:center;}
.s-overlay.show{display:flex;}
.s-popup{background:white;border-radius:22px;padding:40px 36px;text-align:center;max-width:380px;width:90%;box-shadow:0 30px 80px rgba(0,0,0,0.4);animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
.sp-icon{font-size:60px;margin-bottom:14px;display:block;}
.sp-title{font-size:22px;font-weight:800;color:#1e293b;margin-bottom:8px;}
.sp-body{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:18px;}
.sp-stats{display:flex;gap:12px;justify-content:center;margin-bottom:22px;flex-wrap:wrap;}
.sp-stat{padding:12px 20px;border-radius:12px;font-weight:800;font-size:15px;}
.sp-stat.p{background:#dcfce7;color:#166534;}.sp-stat.a{background:#fee2e2;color:#991b1b;}
.sp-btn{padding:13px 36px;background:linear-gradient(135deg,#1a56db,#3b82f6);color:white;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:0.2s;}
.sp-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,86,219,0.3);}

@media(max-width:600px){.student-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}.btn-row{gap:5px;}}
</style>
</head>
<body>

<div class="navbar">
  <h2>📝 Mark Attendance</h2>
  <div>
    <button style="background:rgba(255,255,255,0.18);color:white;" onclick="goHome()">🏠 Home</button>
    <button style="background:#ef4444;color:white;" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="page">
  <div class="info-bar">
    <div class="info-item"><span>Date</span><strong id="dateDisplay">—</strong></div>
    <div class="info-item"><span>Subject</span><strong id="subjectDisplay">—</strong></div>
    <div class="info-item"><span>Section</span><strong id="sectionDisplay">—</strong></div>
    <div class="info-item"><span>Period</span><strong id="periodDisplay">—</strong></div>
    <div class="info-item"><span>Students</span><strong id="countDisplay">—</strong></div>
  </div>

  <div class="notice warn" id="remarkNotice" style="display:none;">✏️ Re-marking attendance — Admin has unlocked this date.</div>
  <div class="notice lock" id="lockNotice"   style="display:none;">🔒 Past date — locked. Contact admin to unlock for re-marking.</div>

  <div class="controls">
    <div class="btn-row">
      <input class="bulk-inp" id="bulkInput" placeholder="Roll suffix e.g. 01,02 or 01-10">
      <button class="btn p" onclick="markBulk('present')">✅ Present</button>
      <button class="btn a" onclick="markBulk('absent')">❌ Absent</button>
      <button class="btn u" onclick="undoLast()">↩ Undo</button>
      <button class="btn c" onclick="clearAll()">🧹 Clear</button>
      <button class="btn e" onclick="exportCSV()">💾 Export</button>
    </div>
    <div class="btn-row">
      <input class="search-inp" id="searchBox" placeholder="🔍 Search roll number...">
      <button class="btn w" onclick="markRemainingPresent()">⚡ All Remaining Present</button>
      <button class="btn a" onclick="markRemainingAbsent()">🚫 All Remaining Absent</button>
    </div>
  </div>

  <div class="student-grid" id="studentGrid"></div>

  <div class="summary-panel">
    <h3>📊 Live Summary</h3>
    <div class="summary-stats">
      <div class="ss"><div class="val" id="cP">0</div><div class="lbl">Present</div></div>
      <div class="ss"><div class="val" id="cA">0</div><div class="lbl">Absent</div></div>
      <div class="ss"><div class="val" id="cM">0</div><div class="lbl">Marked</div></div>
      <div class="ss"><div class="val" id="cU">0</div><div class="lbl">Unmarked</div></div>
    </div>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="submit-row">
    <button class="submit-btn" id="submitBtn" onclick="submitAttendance()">📤 Submit Attendance</button>
  </div>
</div>

<!-- SUCCESS POPUP -->
<div class="s-overlay" id="successOverlay">
  <div class="s-popup">
    <span class="sp-icon">🎉</span>
    <div class="sp-title">Attendance Submitted!</div>
    <div class="sp-body" id="spBody"></div>
    <div class="sp-stats">
      <div class="sp-stat p" id="spPresent">✅ 0 Present</div>
      <div class="sp-stat a" id="spAbsent">❌ 0 Absent</div>
    </div>
    <button class="sp-btn" onclick="goHome()">✅ Done — Back to Dashboard</button>
  </div>
</div>

<script>
// ===== ROLL GENERATOR (self-contained) =====
const _SL="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
function _si(s){return /^[0-9]{2}$/.test(s)?parseInt(s,10):100+_SL.indexOf(s[0])*10+parseInt(s[1],10);}
function _is(n){if(n<=99)return String(n).padStart(2,"0");const o=n-100;return _SL[Math.floor(o/10)]+(o%10);}
function _gen(br,s,e){const r=[];for(let i=_si(s);i<=_si(e);i++)r.push("25G01A"+br+_is(i));return r;}
const ROLLS={
  "CSE - A":_gen("05","01","75"),"CSE - B":_gen("05","76","F0"),
  "CSE - C":_gen("05","F1","M5"),"CSE - D":_gen("05","M6","R9"),
  "A.I - A":_gen("43","01","75"),"A.I - B":_gen("43","76","F0"),"A.I - C":_gen("43","F1","I2"),
  "AIML - A":_gen("42","01","75"),"AIML - B":_gen("42","76","F0"),"AIML - C":_gen("42","F1","M0"),
  "D.S":_gen("32","01","41"),
  "ECE - A":_gen("04","01","75"),"ECE - B":_gen("04","76","B5"),"ECE - C":_gen("02","01","19"),
  "CIVIL":_gen("01","02","09"),"Mechanical":_gen("03","01","12"),
};

// ===== INIT =====
// ✅ API is defined in utils.js - removed duplicate
const teacherSub = localStorage.getItem("subject")||"";
const selSub     = localStorage.getItem("selectedSubject")||"";
const date       = localStorage.getItem("selectedDate")||"";
const section    = localStorage.getItem("section")||"";
const period     = localStorage.getItem("period")||"";
const isRemark   = localStorage.getItem("isRemark")==="true";
const unlockId   = localStorage.getItem("reMarkUnlockId")||"";

const subNames={"PHY":"Physics","BEEE":"Electrical (BEEE)","ECE":"Electronics (BEEE)","DS":"Data Structures","DS LAB":"DS Lab","DEVC":"DE&VC","EG LAB":"EG Lab","IT WORKSHOP":"IT Workshop","PHY LAB":"Physics Lab","EEE LAB":"EEE Lab"};
const subMap={"PHY":["PHY","PHY LAB"],"BEEE":["BEEE","EEE LAB"],"ECE":["ECE","EEE LAB"],"DS":["DS","DS LAB"],"IT WORKSHOP":["IT WORKSHOP"],"EG LAB":["EG LAB"],"DEVC":["DEVC"]};

if(!teacherSub||!selSub||!(subMap[teacherSub]||[teacherSub]).includes(selSub)){
  alert("❌ Unauthorized! Go back and select your period.");
  window.location.href="teacherhome.html";
}

if(!date){alert("No date selected!");window.location.href="dateselect.html";}

const today=new Date().toISOString().split("T")[0];
let isLocked=false;
if(date>today){alert("❌ Cannot mark for a future date!");window.location.href="teacherhome.html";}
if(date<today&&!isRemark){isLocked=true;}

const dp=date.split("-");
document.getElementById("dateDisplay").textContent=`${dp[2]}/${dp[1]}/${dp[0]}`;
document.getElementById("subjectDisplay").textContent=subNames[selSub]||selSub;
document.getElementById("sectionDisplay").textContent=section;
document.getElementById("periodDisplay").textContent=period?`Period ${period}`:"—";
if(isRemark)document.getElementById("remarkNotice").style.display="block";
if(isLocked)document.getElementById("lockNotice").style.display="block";

const students=ROLLS[section]||[];
document.getElementById("countDisplay").textContent=students.length+" students";

if(students.length===0){
  document.getElementById("studentGrid").innerHTML=
    `<p style="color:white;grid-column:1/-1;text-align:center;padding:30px;">⚠️ No students found for "${section}". Go back and select a valid section.</p>`;
}

// ===== STATE =====
let atMap={},hist=[],pCnt=0,aCnt=0,searchQ="";

// ===== RENDER =====
function render(){
  const grid=document.getElementById("studentGrid");
  const list=searchQ?students.filter(s=>s.toLowerCase().includes(searchQ.toLowerCase())):students;
  grid.innerHTML="";
  list.forEach(roll=>{
    const st=atMap[roll]||"unmarked";
    const d=document.createElement("div");
    d.className=`s-card ${st}`;
    d.textContent=roll;
    d.onclick=()=>{if(isLocked){alert("🔒 Locked. Contact admin.");return;}toggle(roll);};
    grid.appendChild(d);
  });
  updateSummary();
}

function toggle(roll){
  const prev=atMap[roll];
  hist.push({roll,prev});
  if(prev==="present"){atMap[roll]="absent";pCnt--;aCnt++;}
  else if(prev==="absent"){delete atMap[roll];aCnt--;}
  else{atMap[roll]="present";pCnt++;}
  render();
}

function applyStatus(roll,st){
  const prev=atMap[roll];
  hist.push({roll,prev});
  if(prev==="present")pCnt--;if(prev==="absent")aCnt--;
  atMap[roll]=st;
  if(st==="present")pCnt++;else aCnt++;
}

function markBulk(st){
  if(isLocked){alert("🔒 Locked.");return;}
  const inp=document.getElementById("bulkInput").value.trim();
  if(!inp){alert("Enter roll suffix e.g. 01 or 01-10");return;}
  inp.split(",").forEach(part=>{
    part=part.trim();
    if(part.includes("-")){
      const[a,b]=part.split("-").map(x=>x.trim().padStart(2,"0"));
      students.forEach(s=>{const sf=s.slice(-2);if(sf>=a&&sf<=b)applyStatus(s,st);});
    } else {
      const pad=part.padStart(2,"0");
      students.filter(s=>s.endsWith(pad)).forEach(s=>applyStatus(s,st));
    }
  });
  render();
  document.getElementById("bulkInput").value="";
}

function undoLast(){
  if(!hist.length)return;
  const{roll,prev}=hist.pop();
  const cur=atMap[roll];
  if(cur==="present")pCnt--;if(cur==="absent")aCnt--;
  if(prev){atMap[roll]=prev;if(prev==="present")pCnt++;else aCnt++;}
  else delete atMap[roll];
  render();
}

function clearAll(){atMap={};hist=[];pCnt=0;aCnt=0;render();}
function markRemainingPresent(){if(isLocked){alert("🔒 Locked.");return;}students.forEach(s=>{if(!atMap[s]){atMap[s]="present";pCnt++;}});render();}
function markRemainingAbsent() {if(isLocked){alert("🔒 Locked.");return;}students.forEach(s=>{if(!atMap[s]){atMap[s]="absent"; aCnt++;}});render();}

document.getElementById("searchBox").addEventListener("input",function(){searchQ=this.value.trim();render();});

// ===== CHART =====
const pie=new Chart(document.getElementById("pieChart"),{
  type:"doughnut",
  data:{labels:["Present","Absent","Unmarked"],datasets:[{data:[0,0,students.length],backgroundColor:["#4caf50","#f44336","rgba(255,255,255,0.2)"],borderWidth:0}]},
  options:{plugins:{legend:{position:"bottom",labels:{color:"#1e293b",font:{size:12},boxWidth:14}}},cutout:"65%"}
});

function updateSummary(){
  const u=Math.max(0,students.length-pCnt-aCnt);
  document.getElementById("cP").textContent=pCnt;
  document.getElementById("cA").textContent=aCnt;
  document.getElementById("cM").textContent=pCnt+aCnt;
  document.getElementById("cU").textContent=u;
  pie.data.datasets[0].data=[pCnt,aCnt,u];
  pie.update();
}

function exportCSV(){
  let csv="Roll No,Status\n";
  students.forEach(s=>csv+=`${s},${atMap[s]==="present"?"Present":atMap[s]==="absent"?"Absent":"Not Marked"}\n`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`att_${selSub}_${section}_${date}.csv`;
  a.click();
}

// ===== SUBMIT =====
// ===== SUBMIT =====
async function submitAttendance(){
  if(isLocked){alert("🔒 Date is locked. Contact admin to unlock.");return;}

  const marked=Object.keys(atMap).length;
  if(marked===0){
    alert("⚠️ No students marked yet!\n\nClick on student cards to mark them Present or Absent, then submit.");
    return;
  }

  const unmarked=students.length-marked;
  if(unmarked>0){
    const ok=confirm(
      `📋 Attendance Summary:\n` +
      `✅ Present: ${pCnt}\n❌ Absent: ${aCnt}\n⚪ Unmarked: ${unmarked}\n\n` +
      `${unmarked} student(s) are not marked.\nSubmit anyway? (They will be skipped.)`
    );
    if(!ok)return;
  }

  // Build payload (capitalized for server)
  const payload={};
  students.forEach(s=>{
    if(atMap[s]==="present") payload[s]="Present";
    else if(atMap[s]==="absent") payload[s]="Absent";
  });

  const btn=document.getElementById("submitBtn");
  btn.disabled=true;
  btn.textContent="⏳ Submitting...";

  try{
    let result;
    
    // ✅ FIXED: Use AbortController for timeout
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);
    
        const baseAPI = window.location.origin;
    const res = await fetch(baseAPI+"/submit-attendance",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        date,
        subject:selSub,
        section,
        data:payload,
        unlockId:unlockId||null
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeout);

    // ✅ FIXED: Read raw text first, then parse
        const rawText = await res.text();
    console.log("=== RAW SERVER RESPONSE ===");
    console.log("Status:", res.status);
    console.log("Raw text:", rawText);
    console.log("Text length:", rawText.length);
    console.log("===========================");
    
    try {
      result = JSON.parse(rawText);
    } catch(parseErr) {
      console.error("Server returned non-JSON:", rawText);
      throw new Error("Server returned invalid response. Status: " + res.status);
    }

    btn.disabled=false;
    btn.textContent="📤 Submit Attendance";

    if(result.success){
      localStorage.removeItem("reMarkUnlockId");
      localStorage.removeItem("isRemark");

      const subLabel=subNames[selSub]||selSub;
      document.getElementById("spBody").textContent=
        `${subLabel} attendance for ${section} on ${dp[2]}/${dp[1]}/${dp[0]} saved successfully!`;
      document.getElementById("spPresent").textContent=`✅ ${pCnt} Present`;
      document.getElementById("spAbsent").textContent =`❌ ${aCnt} Absent`;
      document.getElementById("successOverlay").classList.add("show");

    } else {
      alert("❌ Submission failed!\n"+(result.message||"Please try again."));
    }
    
  } catch(err){
    btn.disabled=false;
    btn.textContent="📤 Submit Attendance";
    console.error("Submit error:",err);
    
    // ✅ FIXED: Better error messages
    if(err.name === "AbortError"){
      alert("❌ Request timed out!\n\nThe server took too long to respond.\nPlease check your connection and try again.");
    } else {
      alert("❌ Network error!\n\nCheck your internet connection and try again.\n\nError: "+err.message);
    }
  }
}

document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT")return;if(e.key==="u")undoLast();if(e.key==="c")clearAll();});
function goHome(){localStorage.removeItem("isRemark");window.location.href="teacherhome.html";}
function logout(){localStorage.clear();window.location.href="index.html";}

render();
</script>

<div id="loader" style="display:none;"><div class="spinner"></div></div>
<script src="utils.js"></script>
</body>
</html>
