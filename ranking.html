<!DOCTYPE html>
<html>
<head>
    <title>Teacher Ranking</title>
    <link rel="icon" type="image/png" href="/svpp-logo.png">
    <link rel="stylesheet" href="style.css">
 
    <style>
        .container {
            width: 80%;
            margin: auto;
            margin-top: 30px;
        }
 
        table {
            width: 100%;
            border-collapse: collapse;
        }
 
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ccc;
        }
 
        th {
            background: #333;
            color: white;
        }
 
        .gold { color: gold; font-weight: bold; }
        .silver { color: silver; font-weight: bold; }
        .bronze { color: #cd7f32; font-weight: bold; }
    </style>
</head>
 
<body class="teacher-bg">
 
<div class="container">
 
    <h2>🏆 Teacher Ranking</h2>
 
    <table id="rankTable">
        <tr>
            <th>Rank</th>
            <th>Subject</th>
            <th>Performance %</th>
        </tr>
    </table>
 
</div>
 <script src="utils.js"></script>
<script>
// ✅ FIXED: was "http://localhost:3000" — breaks on Render
if (!window.API) {
  window.API = window.location.origin;
}
 
async function loadRanking(){
    showLoader();
 
    const res = await fetch(window.API + "/attendance");
    const data = await res.json();
 
    let subjectMap = {};
 
    data.forEach(d => {
        if(!subjectMap[d.subject]){
            subjectMap[d.subject] = { present:0, total:0 };
        }
        subjectMap[d.subject].total++;
        if(d.status === "Present"){
            subjectMap[d.subject].present++;
        }
    });
 
    let ranking = [];
 
    for(let sub in subjectMap){
        let p = subjectMap[sub].present;
        let t = subjectMap[sub].total;
        let percent = ((p/t)*100).toFixed(1);
        ranking.push({ subject: sub, percent: Number(percent) });
    }
 
    ranking.sort((a,b) => b.percent - a.percent);
 
    let table = document.getElementById("rankTable");
 
    if(ranking.length === 0){
        hideLoader();
        table.innerHTML += `
            <tr>
                <td colspan="3" style="color:red; font-size:18px; padding:20px;">
                    🚫 No Data Available — Please mark attendance first
                </td>
            </tr>
        `;
        return;
    }
 
    ranking.forEach((r, index) => {
        let rank = index + 1;
        let medal = "";
        let cls = "";
 
        if(rank === 1){ medal = "🥇"; cls="gold"; }
        else if(rank === 2){ medal = "🥈"; cls="silver"; }
        else if(rank === 3){ medal = "🥉"; cls="bronze"; }
 
        let row = table.insertRow();
        row.innerHTML = `
            <td class="${cls}">${medal} ${rank}</td>
            <td>${r.subject}</td>
            <td>${r.percent}%</td>
        `;
    });
 
    hideLoader();
}
 
loadRanking();
</script>
<!-- 🔄 LOADER -->
<div id="loader" style="display:none;">
  <div class="spinner"></div>
</div>
</body>
</html>
