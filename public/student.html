<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Login — SVPCET</title>
    <link rel="icon" type="image/png" href="/svpp-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

      :root {
        --bg:     #04050f;
        --accent: #10b981;
        --accent2:#047857;
        --glow:   rgba(16,185,129,0.3);
        --text:   #f0f0ff;
        --muted:  rgba(200,240,220,0.45);
      }

      html, body { height:100%; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); overflow-x:hidden; }

      #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

      .orb { position:fixed; border-radius:50%; filter:blur(90px); opacity:0.15; pointer-events:none; z-index:0; animation:drift 18s ease-in-out infinite alternate; }
      .orb-1 { width:480px; height:480px; background:#10b981; top:-120px; right:-80px; animation-delay:0s; }
      .orb-2 { width:360px; height:360px; background:#0d9488; bottom:-80px; left:-80px; animation-delay:-9s; }
      @keyframes drift { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,40px) scale(1.06)} 100%{transform:translate(40px,-20px) scale(0.95)} }

      .grid-overlay {
        position:fixed; inset:0; z-index:0; pointer-events:none;
        background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
        background-size:60px 60px;
        mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
      }

      .wrapper {
        position:relative; z-index:10;
        min-height:100vh; display:flex; flex-direction:column;
        align-items:center; justify-content:center; padding:40px 24px;
      }

      /* ── CARD ── */
      .login-card {
        width:100%; max-width:420px;
        background:rgba(255,255,255,0.04);
        backdrop-filter:blur(24px);
        border:1px solid rgba(255,255,255,0.08);
        border-radius:24px;
        padding:44px 40px;
        box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
        animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
        position:relative; overflow:hidden;
      }
      .login-card::before {
        content:''; position:absolute; top:0; left:0; right:0; height:3px;
        background:linear-gradient(90deg,transparent,#10b981,#34d399,transparent);
        border-radius:24px 24px 0 0;
      }
      @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

      .badge {
        display:flex; align-items:center; gap:7px; width:fit-content;
        padding:5px 14px; border-radius:100px; margin:0 auto 22px;
        background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2);
        font-family:'Syne',sans-serif; font-size:10px; font-weight:600;
        color:rgba(110,231,183,0.8); letter-spacing:2px; text-transform:uppercase;
      }
      .badge-dot { width:6px; height:6px; border-radius:50%; background:#10b981; box-shadow:0 0 8px #10b981; animation:pulse-dot 2s ease infinite; }
      @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }

      .login-icon {
        width:68px; height:68px;
        background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,150,105,0.2));
        border:1px solid rgba(16,185,129,0.3); border-radius:18px;
        display:flex; align-items:center; justify-content:center;
        font-size:30px; margin:0 auto 18px;
        box-shadow:0 8px 24px rgba(16,185,129,0.2);
        animation:iconFloat 3s ease-in-out infinite;
      }
      @keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

      .card-title {
        font-family:'Syne',sans-serif; font-size:26px; font-weight:800;
        text-align:center; letter-spacing:-0.5px;
        background:linear-gradient(135deg,#ffffff 40%,#6ee7b7 100%);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        margin-bottom:6px;
      }
      .card-sub { text-align:center; font-size:13px; color:var(--muted); margin-bottom:28px; }

      .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent); margin-bottom:24px; }

      .input-label {
        display:block; font-family:'Syne',sans-serif; font-size:10px; font-weight:700;
        color:rgba(110,231,183,0.7); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px;
      }
      .input-group { margin-bottom:16px; }

      input, select {
        width:100%; padding:13px 16px;
        background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
        border-radius:12px; font-size:14px; font-family:'DM Sans',sans-serif;
        color:#f0f0ff; outline:none; transition:all 0.25s; appearance:none;
      }
      input::placeholder { color:rgba(200,240,220,0.3); }
      input:focus, select:focus {
        border-color:rgba(16,185,129,0.6);
        background:rgba(16,185,129,0.06);
        box-shadow:0 0 0 4px rgba(16,185,129,0.1);
      }
      input.err { border-color:rgba(239,68,68,0.6) !important; background:rgba(239,68,68,0.05) !important; }
      select option { background:#0f172a; color:#f0f0ff; }

      .err-msg {
        display:none; margin-top:8px; padding:10px 14px;
        background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2);
        border-radius:10px; font-size:13px; font-weight:500;
        color:#fca5a5; line-height:1.5;
      }
      .err-msg.show { display:block; }

      .login-btn {
        width:100%; padding:14px;
        background:linear-gradient(135deg,#047857,#10b981);
        color:white; border:none; border-radius:12px;
        font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
        letter-spacing:0.5px; cursor:pointer; transition:all 0.3s;
        margin-top:6px; position:relative; overflow:hidden;
      }
      .login-btn::before {
        content:''; position:absolute; inset:0;
        background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.12) 50%,transparent 60%);
        transform:translateX(-100%); transition:transform 0.5s ease;
      }
      .login-btn:hover::before { transform:translateX(100%); }
      .login-btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(16,185,129,0.4); }
      .login-btn:active { transform:translateY(0); }

      .back-link {
        display:block; text-align:center; margin-top:20px;
        font-size:13px; color:rgba(110,231,183,0.6);
        text-decoration:none; font-weight:500; transition:color 0.2s;
      }
      .back-link:hover { color:#6ee7b7; }

      /* ── SUCCESS OVERLAY ── */
      .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
      .overlay.show { display:flex; }
      .popup {
        background:linear-gradient(135deg,#0f172a,#1e293b);
        border:1px solid rgba(16,185,129,0.2); border-radius:22px;
        padding:40px 36px; text-align:center; max-width:340px; width:90%;
        animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
        box-shadow:0 30px 80px rgba(0,0,0,0.6);
      }
      @keyframes popIn { from{opacity:0;transform:scale(0.65)} to{opacity:1;transform:scale(1)} }
      .pop-icon { font-size:52px; margin-bottom:14px; display:block; }
      .pop-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#f0f0ff; margin-bottom:8px; }
      .pop-roll { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:#34d399; margin:10px 0; }
      .pop-sub { font-size:13px; color:var(--muted); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <div class="login-card">

    <div class="badge"><span class="badge-dot"></span>Student Portal</div>

    <div class="login-icon">👨‍🎓</div>
    <div class="card-title">Student Login</div>
    <p class="card-sub">Enter your roll number and section</p>

    <div class="divider"></div>

    <div class="input-group">
      <label class="input-label">Roll Number</label>
      <input type="text" id="roll" placeholder="e.g. 25G01A0501" autocomplete="off"
             oninput="clearErrors()" onkeydown="if(event.key==='Enter')login()">
      <div class="err-msg" id="rollErr"></div>
    </div>

    <div class="input-group">
      <label class="input-label">Section</label>
      <select id="section" onchange="clearErrors()">
        <option value="">— Select your section —</option>
        <option>CSE - A</option><option>CSE - B</option>
        <option>CSE - C</option><option>CSE - D</option>
        <option>A.I - A</option><option>A.I - B</option><option>A.I - C</option>
        <option>AIML - A</option><option>AIML - B</option><option>AIML - C</option>
        <option>CIVIL</option><option>D.S</option>
        <option>ECE - A</option><option>ECE - B</option><option>ECE - C</option>
        <option>Mechanical</option>
      </select>
      <div class="err-msg" id="secErr"></div>
    </div>

    <button class="login-btn" onclick="login()">Login →</button>
    <a href="index.html" class="back-link">← Back to Home</a>

  </div>
</div>

<!-- SUCCESS POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <span class="pop-icon">✅</span>
    <div class="pop-title">Login Successful!</div>
    <div class="pop-roll" id="popRoll"></div>
    <div class="pop-sub">Redirecting to your dashboard...</div>
  </div>
</div>
<script src="utils.js"></script>
<script>
// ===== ROLL NUMBER DATA =====
const _SL="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
function _si(s){return /^[0-9]{2}$/.test(s)?parseInt(s,10):100+_SL.indexOf(s[0])*10+parseInt(s[1],10);}
function _is(n){if(n<=99)return String(n).padStart(2,"0");const o=n-100;return _SL[Math.floor(o/10)]+(o%10);}
function _gen(br,s,e){const r=[];for(let i=_si(s);i<=_si(e);i++)r.push("25G01A"+br+_is(i));return r;}
const ROLLS={
  "CSE - A":_gen("05","01","75"),"CSE - B":_gen("05","76","F0"),
  "CSE - C":_gen("05","F1","M5"),"CSE - D":_gen("05","M6","R9"),
  "A.I - A":_gen("43","01","75"),"A.I - B":_gen("43","76","F0"),"A.I - C":_gen("43","F1","I2"),
  "AIML - A":_gen("42","01","75"),"AIML - B":_gen("42","76","F0"),"AIML - C":_gen("42","F1","M0"),
  "D.S":_gen("32","01","41"),
  "ECE - A":_gen("04","01","75"),"ECE - B":_gen("04","76","B5"),"ECE - C":_gen("02","01","19"),
  "CIVIL":_gen("01","02","09"),"Mechanical":_gen("03","01","12"),
};
function findSection(roll){ for(const[s,r]of Object.entries(ROLLS)) if(r.includes(roll)) return s; return null; }

function clearErrors(){
  ["rollErr","secErr"].forEach(id=>{ document.getElementById(id).className="err-msg"; document.getElementById(id).textContent=""; });
  document.getElementById("roll").classList.remove("err");
}
function showErr(id,msg){ const el=document.getElementById(id); el.textContent=msg; el.className="err-msg show"; }

function login(){
  clearErrors();
  const rawRoll=document.getElementById("roll").value.trim();
  const section=document.getElementById("section").value;
  if(!rawRoll){ showErr("rollErr","⚠️ Please enter your roll number."); document.getElementById("roll").classList.add("err"); document.getElementById("roll").focus(); return; }
  const roll=rawRoll.toUpperCase();
  if(!section){ showErr("secErr","⚠️ Please select your section."); return; }
  const sectionRolls=ROLLS[section]||[];
  if(sectionRolls.includes(roll)){ proceedLogin(roll,section); return; }
  const actualSection=findSection(roll);
  if(actualSection){
    showErr("rollErr",`❌ You are not from ${section}. Roll "${roll}" belongs to ${actualSection}. Please select the correct section.`);
    document.getElementById("roll").classList.add("err");
    document.getElementById("section").value=actualSection;
    return;
  }
  showErr("rollErr",`❌ Invalid roll number "${roll}". Please check and try again.`);
  document.getElementById("roll").classList.add("err");
}

function proceedLogin(roll,section){
  localStorage.setItem("studentRoll",roll);
  localStorage.setItem("section",section);
  document.getElementById("popRoll").textContent=roll+" — "+section;
  document.getElementById("overlay").classList.add("show");
  setTimeout(()=>{ window.location.href="studenthome.html"; },1500);
}
</script>

<!-- PARTICLE BACKGROUND -->
<script>
(function(){
  const canvas=document.getElementById("bg-canvas");
  const ctx=canvas.getContext("2d");
  let W,H,particles=[];
  const COLORS=["16,185,129","52,211,153","5,150,105"];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function rand(a,b){return Math.random()*(b-a)+a;}
  function mkP(){
    const c=COLORS[Math.floor(Math.random()*COLORS.length)];
    return{x:rand(0,W),y:rand(0,H),r:rand(0.5,2),vx:rand(-0.2,0.2),vy:rand(-0.35,-0.08),alpha:rand(0.1,0.5),color:c,life:0,maxLife:rand(200,500)};
  }
  function init(){ particles=[]; for(let i=0;i<80;i++){const p=mkP();p.life=Math.random()*p.maxLife;particles.push(p);} }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<particles.length;i++){
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life++;
      const pr=p.life/p.maxLife;
      const fade=pr<0.1?pr/0.1:pr>0.8?(1-pr)/0.2:1;
      for(let j=i+1;j<particles.length;j++){
        const q=particles[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){ctx.strokeStyle=`rgba(255,255,255,${(1-d/100)*0.05})`;ctx.lineWidth=0.4;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}
      }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color},${p.alpha*fade})`; ctx.fill();
      if(p.life>=p.maxLife) particles[i]=mkP();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize",()=>{resize();init();});
  resize(); init(); draw();
})();
</script>

<div id="loader" style="display:none;"><div class="spinner"></div></div>
</body>
</html>
